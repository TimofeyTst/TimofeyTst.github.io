    <!-- Theme detection before first paint (eliminates dark→light FOUC) -->
    <!-- Default to dark if no preference stored -->
    <script>
      (function(){
        var s=localStorage.getItem('theme');
        var d=s ? s==='dark' : (window.matchMedia('(prefers-color-scheme:dark)').matches !== false);
        // Default to dark if no theme stored
        if(!s) d=true;
        var h=document.documentElement;
        h.classList.toggle('dark',d);
        h.classList.toggle('light',!d);
        var m=document.querySelector('meta[name="color-scheme"]');
        if(m)m.content=d?'dark':'light';
        var t=document.querySelector('meta[name="theme-color"]');
        if(t)t.content=d?'#0a0a0a':'#ffffff';
      })()
    </script>
